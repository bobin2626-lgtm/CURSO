<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONE - Crecimiento Personal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Paleta: Rojo (#9B1B21), Amarillo (#FDCB34), Negro (#000000) */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: #000;
            border-bottom: 2px solid #9B1B21;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .phoenix-logo-img {
            height: 50px;
            width: auto;
        }

        .brand-name {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .accent-red { color: #9B1B21; }

        /* --- HERO --- */
        .hero {
            text-align: center;
            padding: 80px 10%;
            background: radial-gradient(circle at center, #1a0a0a 0%, #000 100%);
        }

        .hero h1 { font-size: 2.8rem; margin-bottom: 10px; }
        .glow { color: #FDCB34; text-shadow: 0 0 15px rgba(253, 203, 52, 0.3); }

        /* --- GRID --- */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px 8%;
        }

        .course-card {
            background: #111;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #222;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .course-card:hover {
            border-color: #FDCB34;
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(155, 27, 33, 0.3);
        }

        .course-badge {
            background: #9B1B21;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 15px;
            width: fit-content;
        }

        .course-card h3 { color: #FDCB34; margin-bottom: 10px; }
        .course-card p { color: #ccc; font-size: 0.9rem; margin-bottom: 15px; }

        /* --- INSTRUCTOR & BUTTON --- */
        .instructor-info {
            border-top: 1px solid #222;
            padding-top: 15px;
        }

        .msg-btn {
            background: transparent;
            border: 1px solid #FDCB34;
            color: #FDCB34;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            width: 100%;
            transition: 0.3s;
        }

        .msg-btn:hover {
            background: #FDCB34;
            color: #000;
        }

        /* --- MODAL (PANTALLA DE MENSAJE) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #151515;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #9B1B21;
            position: relative;
            text-align: center;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #555;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .modal-content h2 { color: #FDCB34; margin-bottom: 10px; }
        
        textarea {
            width: 100%;
            height: 120px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            resize: none;
            margin-bottom: 15px;
            margin-top: 10px;
        }

        .send-btn {
            background: #9B1B21;
            color: #fff;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .send-btn:hover { background: #c4242a; }

        footer { text-align: center; padding: 40px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo-container">
                <img src="DONE LOGO_Mesa de trabajo 3-01.png" alt="Logo Phoenix" class="phoenix-logo-img">
                <span class="brand-name">DONE <span class="accent-red">Crecimiento Personal</span></span>
            </div>
            <div style="color: #FDCB34; font-weight: bold;">VEN +58</div>
        </nav>
    </header>

    <section class="hero">
        <h1>Forja tu mejor <span class="glow">Versión</span></h1>
        <p>Aprende de mentores expertos en mentalidad, disciplina y propósito.</p>
    </section>

    <main class="course-grid">
        <script>
            const cursos = [
                { title: "Disciplina de Acero", cat: "Hábitos", name: "Ángel Díaz", tel: "+58 412-5551234", desc: "Sistemas para dominar tu rutina y eliminar la procrastinación." },
                { title: "Mentalidad de Fénix", cat: "Resiliencia", name: "Arturo Peña", tel: "+58 424-9876543", desc: "Cómo levantarte después del fracaso con más fuerza que antes." },
                { title: "Inteligencia Emocional", cat: "Psicología", name: "Carlos Mendoza", tel: "+58 416-1112233", desc: "Controla tus impulsos y mejora tus relaciones interpersonales." },
                { title: "Propósito y Visión", cat: "Espiritualidad", name: "Nathalie Rivas", tel: "+58 414-3334455", desc: "Encuentra lo que te mueve y construye una vida con sentido." },
                { title: "Finanzas Conscientes", cat: "Abundancia", name: "Luis Salazar", tel: "+58 426-5556677", desc: "Cambia tu relación con el dinero y planifica tu libertad." },
                { title: "Oratoria de Alto Impacto", cat: "Comunicación", name: "Elena Vargas", tel: "+58 412-8889900", desc: "Domina el arte de influir y comunicar tus ideas con poder." },
                { title: "Biohacking y Salud", cat: "Cuerpo", name: "Samuel Ortiz", tel: "+58 414-0001122", desc: "Optimiza tu energía física y mental para el alto rendimiento." },
                { title: "Liderazgo Consciente", cat: "Influencia", name: "Sofía Blanco", tel: "+58 424-7778899", desc: "Guía a otros desde la autenticidad y los valores humanos." }
            ];

            cursos.forEach(c => {
                document.write(`
                    <article class="course-card">
                        <div>
                            <div class="course-badge">${c.cat}</div>
                            <h3>${c.title}</h3>
                            <p>${c.desc}</p>
                        </div>
                        <div class="instructor-info">
                            <strong>Mentor: ${c.name}</strong>
                            <p style="font-size:0.8rem; color:#FDCB34;">WhatsApp: ${c.tel}</p>
                            <button class="msg-btn" onclick="openMessage('${c.name}')">Contactar Mentor</button>
                        </div>
                    </article>
                `);
            });
        </script>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeMessage()">&times;</span>
            <h2 id="instructorName">Nombre</h2>
            <p style="color:#ccc; font-size:0.9rem;">Escribe tu mensaje para empezar tu transformación:</p>
            <textarea id="userMsg" placeholder="Hola, estoy listo para iniciar mi proceso de crecimiento..."></textarea>
            <button class="send-btn" onclick="sendAlert()">Enviar Mensaje Directo</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 DONE Crecimiento Personal Studio. Hecho en Venezuela.</p>
    </footer>

    <script>
        const modal = document.getElementById('modal');
        const instructorNameHeading = document.getElementById('instructorName');

        function openMessage(name) {
            instructorNameHeading.innerText = name;
            modal.style.display = 'flex';
        }

        function closeMessage() {
            modal.style.display = 'none';
        }

        function sendAlert() {
            const msg = document.getElementById('userMsg').value;
            if(msg.trim() === "") {
                alert("Por favor, escribe un mensaje.");
            } else {
                alert("Tu mensaje ha sido enviado al mentor. ¡Prepárate para el cambio!");
                document.getElementById('userMsg').value = "";
                closeMessage();
            }
        }

        window.onclick = function(event) {
            if (event.target == modal) closeMessage();
        }
    </script>

</body>
</html>
